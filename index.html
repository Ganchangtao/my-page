<html lang="zh">
<head>
    <meta charset="UTF-8">

    <style>
        * {

            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f2f6fc;
            padding: 12px 8px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 12px 8px;
            overflow: hidden;
        }
        .card-header {
            padding: 6px 12px 12px 12px;
            font-size: 15px;
            font-weight: 600;
            color: #1a2b4c;
            border-bottom: 2px solid #e6edf6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .badge-count {
            background: #d3deed;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #0a1f38;
        }
        .view-toggle {
            display: flex;
            gap: 4px;
            background: #e9eff6;
            padding: 4px;
            border-radius: 40px;
        }
        .view-toggle button {
            border: none;
            background: transparent;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            color: #1e3349;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .view-toggle button.active {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            color: #0a1f38;
            font-weight: 600;
        }
        .view-toggle button:active { opacity: 0.6; }

        #viewContainer { transition: 0.2s; }

        /* ===== 表格视图 (PC默认) ===== */
        .table-view .city-group { margin-top: 16px; }
        .table-view .city-label {
            background: #d3deed;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            color: #0a1f38;
            display: inline-block;
            margin-bottom: 8px;
        }
        .table-view table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 700px;
        }
        .table-view th {
            background: #1a2b4c;
            color: white;
            font-weight: 600;
            padding: 8px 6px;
            text-align: center;
            border: 1px solid #2c3e6b;
            white-space: nowrap;
            font-size: 12px;
        }
        .table-view td {
            border: 1px solid #d9e1ec;
            padding: 6px 4px;
            text-align: center;
            vertical-align: middle;
            background: white;
            font-size: 12px;
        }
        .table-view tr:nth-child(even) td {
            background-color: #f8faff;
        }
        .table-view .city-wuhan td { background-color: #e1f0fa; }
        .table-view .city-wuhan tr:nth-child(even) td { background-color: #d6e8f5; }
        .table-view .city-zhengzhou td { background-color: #f0f4e8; }
        .table-view .city-zhengzhou tr:nth-child(even) td { background-color: #e8efdd; }
        .table-view .city-xinyang td { background-color: #fce9e6; }
        .table-view .city-xinyang tr:nth-child(even) td { background-color: #f8dfda; }
        .table-view .city-kaifeng td { background-color: #fef7e0; }
        .table-view .city-kaifeng tr:nth-child(even) td { background-color: #fcf2d0; }
        .table-view .city-other td { background-color: #f2f2f2; }
        .table-view .city-other tr:nth-child(even) td { background-color: #eaeaea; }
        .table-view .score-cell { font-weight: 600; color: #1d4e7c; }
        .table-view .fee-cell { font-weight: 500; color: #0a3a5a; }

        /* ===== 卡片视图 (手机默认) ===== */
        .card-view .city-group { margin-top: 16px; }
        .card-view .city-label {
            background: #d3deed;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            color: #0a1f38;
            display: inline-block;
            margin-bottom: 10px;
        }
        .card-view .school-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 12px;
            padding: 12px 14px;
            border: 1px solid #e9eef4;
        }
        .card-view .school-name {
            font-weight: 700;
            font-size: 15px;
            color: #0a1f38;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 6px;
            margin-bottom: 6px;
        }
        .card-view .school-code {
            font-size: 12px;
            color: #5f6f82;
            background: #eef3f9;
            padding: 0 10px;
            border-radius: 30px;
            font-weight: 500;
        }
        .card-view .major-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0 4px 0;
            border-bottom: 1px dashed #eef3f8;
        }
        .card-view .major-row:last-child { border-bottom: none; }
        .card-view .major-info {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 6px 10px;
            flex: 1;
        }
        .card-view .major-name { font-weight: 600; font-size: 14px; color: #1d3a5a; }
        .card-view .major-code { font-size: 12px; color: #5f6f82; background: #f0f4fa; padding: 0 8px; border-radius: 30px; }
        .card-view .major-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 10px 14px; margin-top: 2px; }
        .card-view .meta-item { font-size: 13px; color: #1e3349; background: #f5f8fe; padding: 2px 10px; border-radius: 30px; white-space: nowrap; }
        .card-view .meta-item strong { font-weight: 600; color: #0a2647; }
        .card-view .score-high { background: #e1f0fa; color: #0f3b5e; }
        .card-view .fee { background: #ecf3e9; color: #2a4f2a; }
        .card-view .city-tag { font-size: 12px; color: #3e5a78; background: #eef3f9; padding: 0 10px; border-radius: 30px; display: inline-block; }
        .card-view .city-wuhan .school-card { border-left: 4px solid #5b8db8; }
        .card-view .city-zhengzhou .school-card { border-left: 4px solid #8aa67a; }
        .card-view .city-xinyang .school-card { border-left: 4px solid #d99c8f; }
        .card-view .city-kaifeng .school-card { border-left: 4px solid #dbb869; }
        .card-view .city-other .school-card { border-left: 4px solid #b0bccb; }

        .map-view .city-group { display: none; }
        #mapContainer {
            width: 100%;
            height: 520px;
            border-radius: 16px;
            overflow: hidden;
            margin-top: 12px;
            border: 1px solid #e0e8f0;
            background: #f5f8fc;
            position: relative;
        }
        #mapContainer img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #mapContainer .map-placeholder {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #5f6f82;
            font-size: 14px;
            flex-direction: column;
            gap: 8px;
            background: #f0f4fa;
            text-align: center;
            padding: 16px;
        }
        #mapContainer .map-placeholder .retry-btn {
            margin-top: 8px;
            padding: 8px 24px;
            border-radius: 30px;
            border: 1px solid #1a7bbf;
            background: #1a7bbf;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        #mapContainer .map-placeholder .retry-btn:hover {
            background: #1565a0;
        }
        #mapContainer .map-overlay {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            pointer-events: none;
            white-space: nowrap;
        }
        .map-view .footer-note { margin-top: 12px; }

        .footer-note {
            margin-top: 20px;
            padding: 10px 14px;
            background: #eef3f8;
            border-radius: 40px;
            font-size: 12px;

            text-align: center;

        /* 响应式 */
        @media (max-width: 768px) {
            .card-header { font-size: 14px; }
            .view-toggle button { padding: 4px 10px; font-size: 11px; }
            #mapContainer { height: 380px; }
        }
        @media (max-width: 480px) {

            .card-view .meta-item { font-size: 12px; padding: 2px 8px; }
            .card-view .city-label { font-size: 13px; }
        }
        .hidden { display: none; }
    </style>
</head>

                    { name: '开封文化艺术职业学院', code: '6316', majors: [{ name: '工艺美术品设计', code: '02', score: '335.25', fee: '6000' },{ name: '室内艺术设计', code: '03', score: '351.25', fee: '6000' }] }
                ]
            },
            other: {
                label: '📍 其他城市',
                cityClass: 'city-other',
                center: [112.4540, 34.6181],
                schools: [
                    { name: '河南林业职业学院', code: '6188', cityTag: '洛阳市', majors: [{ name: '视觉传达设计', code: '01', score: '422.75', fee: '6000' },{ name: '数字媒体艺术设计', code: '02', score: '420.5', fee: '6000' }] },
                    { name: '河南物流职业学院', code: '6539', cityTag: '新乡市', majors: [{ name: '视觉传达设计', code: '02', score: '358', fee: '6000' }] },
                    { name: '洛阳文化旅游职业学院', code: '6363', cityTag: '洛阳市', majors: [{ name: '艺术设计', code: '01', score: '357.5', fee: '6000' },{ name: '视觉传达设计', code: '02', score: '355.25', fee: '6000' },{ name: '视觉传达设计', code: '03', score: '355.25', fee: '6000' }] }
                ]
            }
        };

        // 为每个学校补充定位信息
        function enrichSchoolLocations() {
            const cityKeys = ['wuhan', 'zhengzhou', 'xinyang', 'kaifeng', 'other'];
            cityKeys.forEach(key => {
                const group = cityGroups[key];
                if (!group) return;
                group.schools.forEach(school => {
                    const loc = schoolLocations[school.name];
                    if (loc) {
                        school._lng = loc.lng;
                        school._lat = loc.lat;
                        school._detail = loc.detail || '';
                    } else {
                        school._lng = group.center[0];
                        school._lat = group.center[1];
                        school._detail = group.label.replace('📍 ', '').replace(' · 市辖区', '');
                    }
                });
            });
        }
        enrichSchoolLocations();

        function buildSchoolList() {
            const list = [];
            const cityKeys = ['wuhan', 'zhengzhou', 'xinyang', 'kaifeng', 'other'];
            cityKeys.forEach(key => {
                const group = cityGroups[key];
                if (!group) return;
                group.schools.forEach(s => {
                    const firstMajor = s.majors[0] || {};
                    list.push({
                        name: s.name,
                        code: s.code,
                        city: group.label.replace('📍 ', '').replace(' · 市辖区', ''),
                        cityKey: key,
                        lng: s._lng || group.center[0],
                        lat: s._lat || group.center[1],
                        detail: s._detail || '',
                        score: firstMajor.score || '-',
                        fee: firstMajor.fee || '-',
                        majorCount: s.majors.length
                    });
                });
            });
            return list;
        }
        const schoolList = buildSchoolList();
        const totalCount = schoolList.length;

        function isMobile() { return window.innerWidth < 768; }

        // ===== 渲染表格视图 =====
        function renderTableView() {
            const container = document.getElementById('viewContainer');
            if (!container) return;
            const app = document.getElementById('appContainer');
            app.className = 'container table-view';
            app.classList.remove('map-view');

            let html = '';
            const cityKeys = ['wuhan', 'zhengzhou', 'xinyang', 'kaifeng', 'other'];
            cityKeys.forEach(key => {
                const group = cityGroups[key];
                if (!group) return;
                html += `<div class="city-group ${group.cityClass}">`;
                html += `<div class="city-label">${group.label}</div>`;
                html += `<table><thead><tr>`;
                html += `<th>院校代码</th><th>院校名称</th><th>专业名称</th><th>专业代码</th><th>城市</th><th>录取分数</th><th>学费(元/年)</th>`;
                html += `</tr></thead><tbody>`;
                group.schools.forEach(school => {
                    school.majors.forEach((major, idx) => {
                        const cityDisplay = (idx === 0) ? (school.cityTag || (key === 'wuhan' ? '武汉市' : key === 'zhengzhou' ? '郑州市' : key === 'xinyang' ? '信阳市' : key === 'kaifeng' ? '开封市' : '')) : '';
                        html += `<tr>`;
                        html += `<td>${school.code}</td>`;
                        html += `<td>${school.name}</td>`;
                        html += `<td>${major.name}</td>`;
                        html += `<td>${major.code}</td>`;
                        html += `<td>${cityDisplay}</td>`;
                        html += `<td class="score-cell">${major.score}</td>`;
                        html += `<td class="fee-cell">${major.fee}</td>`;
                        html += `</tr>`;
                    });
                });
                html += `</tbody></table>`;
                html += `</div>`;
            });
            container.innerHTML = html;
            document.getElementById('countBadge').textContent = totalCount + ' 条';
        }

        // ===== 渲染卡片视图 =====
        function renderCardView() {
            const container = document.getElementById('viewContainer');
            if (!container) return;
            const app = document.getElementById('appContainer');
            app.className = 'container card-view';
            app.classList.remove('map-view');

            let html = '';
            const cityKeys = ['wuhan', 'zhengzhou', 'xinyang', 'kaifeng', 'other'];
            cityKeys.forEach(key => {
                const group = cityGroups[key];
                if (!group) return;
                html += `<div class="city-group ${group.cityClass}">`;
                html += `<div class="city-label">${group.label}</div>`;
                group.schools.forEach(school => {
                    const cityTagHtml = school.cityTag ? `<span class="city-tag">${school.cityTag}</span>` : '';
                    html += `<div class="school-card">`;
                    html += `<div class="school-name">${school.name} <span class="school-code">${school.code}</span> ${cityTagHtml}</div>`;
                    school.majors.forEach(major => {
                        html += `<div class="major-row">`;
                        html += `<div class="major-info"><span class="major-name">${major.name}</span><span class="major-code">${major.code}</span></div>`;
                        html += `<div class="major-meta">`;
                        html += `<span class="meta-item score-high"><strong>${major.score}</strong></span>`;
                        html += `<span class="meta-item fee">${major.fee}</span>`;
                        html += `</div></div>`;
                    });
                    html += `</div>`;
                });
                html += `</div>`;
            });
            container.innerHTML = html;
            document.getElementById('countBadge').textContent = totalCount + ' 条';
        }

        // ===== 地图视图 (使用高德静态图 + 精确定位) =====
        let mapInitialized = false;
        let currentMapUrl = '';

        function renderMapView() {
            const container = document.getElementById('viewContainer');
            if (!container) return;
            const app = document.getElementById('appContainer');
            app.className = 'container map-view';

            // 使用精确的学校坐标
            const lngs = schoolList.map(s => s.lng);
            const lats = schoolList.map(s => s.lat);
            const centerLng = lngs.reduce((a,b) => a+b, 0) / lngs.length;
            const centerLat = lats.reduce((a,b) => a+b, 0) / lats.length;

            // 生成标记点参数 - 使用精确定位
            const markers = schoolList.map(item => {
                return `${item.lng},${item.lat},1,,,${item.name}`;
            }).join('|');

            // 高德静态图URL (使用https)
            const staticMapUrl = `https://restapi.amap.com/v3/staticmap?location=${centerLng},${centerLat}&zoom=7&size=800*500&markers=${encodeURIComponent(markers)}&key=4c6a81f181b70abe949ceeece66421c9`;
            currentMapUrl = staticMapUrl;

            // 城市分组显示
            let cityListHtml = '';
            const cityKeys = ['wuhan', 'zhengzhou', 'xinyang', 'kaifeng', 'other'];
            const cityLabels = {
                wuhan: '武汉',
                zhengzhou: '郑州',
                xinyang: '信阳',
                kaifeng: '开封',
                other: '其他'
            };
            cityKeys.forEach(key => {
                const group = cityGroups[key];
                if (!group) return;
                const count = group.schools.reduce((sum, s) => sum + s.majors.length, 0);
                cityListHtml += `<span style="display:inline-block;margin:0 6px 6px 0;padding:2px 12px;background:#d3deed;border-radius:30px;font-size:12px;">${cityLabels[key] || key} (${count}条)</span>`;
            });

            // 显示详细定位信息
            let detailHtml = '';
            schoolList.forEach(item => {
                if (item.detail) {
                    detailHtml += `<span style="display:inline-block;margin:0 4px 4px 0;padding:1px 8px;background:#e8edf4;border-radius:30px;font-size:11px;color:#3a5a78;">${item.name}: ${item.detail}</span>`;
                }
            });

            container.innerHTML = `
                <div id="mapContainer">
                    <div class="map-placeholder" id="mapPlaceholder">
                        <span>🗺️ 加载地图中...</span>
                        <span style="font-size:12px; color:#8a9baa;">正在获取院校精确位置</span>
                    </div>
                    <div class="map-overlay">📌 共 ${schoolList.length} 所院校 · 已精确到具体校区</div>
                </div>
                <div style="margin-top:12px;padding:10px 14px;background:#f5f8fc;border-radius:12px;">
                    <div style="font-size:13px;font-weight:600;margin-bottom:6px;">📍 城市分布</div>
                    <div style="display:flex;flex-wrap:wrap;gap:2px;">
                        ${cityListHtml}
                    </div>
                    <div style="font-size:12px;color:#5f6f82;margin-top:6px;">📌 院校精确位置</div>
                    <div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:4px;max-height:80px;overflow-y:auto;">
                        ${detailHtml}
                    </div>
                </div>
            `;

            // 加载静态图
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = function() {
                const placeholder = document.getElementById('mapPlaceholder');
                if (placeholder) {
                    placeholder.innerHTML = `<img src="${staticMapUrl}" alt="院校分布地图" style="width:100%;height:100%;object-fit:contain;">`;
                }
                mapInitialized = true;
            };
            img.onerror = function() {
                const placeholder = document.getElementById('mapPlaceholder');
                if (placeholder) {
                    placeholder.innerHTML = `
                        <span>⚠️ 地图加载失败</span>
                        <span style="font-size:12px; color:#8a9baa;">可能是网络问题或API密钥限制</span>
                        <button class="retry-btn" id="retryMapBtn">🔄 重新加载</button>
                        <span style="font-size:11px; color:#8a9baa; margin-top:4px;">提示：在浏览器中打开此页面，或使用本地服务器访问</span>
                    `;
                    document.getElementById('retryMapBtn')?.addEventListener('click', function() {
                        renderMapView();
                    });
                }
            };
            img.src = staticMapUrl;

            document.getElementById('countBadge').textContent = totalCount + ' 条';
        }

        // ===== 切换逻辑 =====
        let currentView = 'table';
        const toggleButtons = document.querySelectorAll('#viewToggle button');

        function setDefaultView() {
            const defaultView = isMobile() ? 'card' : 'table';
            currentView = defaultView;
            toggleButtons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.view === defaultView) btn.classList.add('active');
            });
            if (defaultView === 'table') renderTableView();
            else if (defaultView === 'card') renderCardView();
        }

        toggleButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                const view = this.dataset.view;
                if (view === currentView && view !== 'map') return;
                toggleButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentView = view;

                if (view === 'table') renderTableView();
                else if (view === 'card') renderCardView();
                else if (view === 'map') {
                    mapInitialized = false;
                    renderMapView();
                }
            });
        });

        setDefaultView();

        let resizeTimer = null;
        window.addEventListener('resize', function() {
            if (resizeTimer) clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (currentView !== 'map') {
                    const newDefault = isMobile() ? 'card' : 'table';
                    if (newDefault !== currentView) {
                        currentView = newDefault;
                        toggleButtons.forEach(btn => {
                            btn.classList.remove('active');
                            if (btn.dataset.view === newDefault) btn.classList.add('active');
                        });
                        if (newDefault === 'table') renderTableView();
                        else renderCardView();
                    }
                }
            }, 300);
        });
    })();
</script>
</body>
</html>
